name: Build and Push to GitHub Container Registry

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3
    
    - name: Log in to GitHub Container Registry
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    
    - name: Build Docker image
      run: |
        docker build -t ghcr.io/godwinisravel/neuroscan-ai:latest .
        docker tag ghcr.io/godwinisravel/neuroscan-ai:latest ghcr.io/godwinisravel/neuroscan-ai:${{ github.sha }}
    
    - name: Push Docker image
      run: |
        docker push ghcr.io/godwinisravel/neuroscan-ai:latest
        docker push ghcr.io/godwinisravel/neuroscan-ai:${{ github.sha }}
    
    - name: Success message
      run: |
        echo "✅ Docker image pushed successfully!"
        echo "📦 Image: ghcr.io/godwinisravel/neuroscan-ai:latest"
        echo "🔗 Pull with: docker pull ghcr.io/godwinisravel/neuroscan-ai:latest"
