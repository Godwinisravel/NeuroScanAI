version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: neuroscan_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root123
      MYSQL_DATABASE: neuroai_db
      MYSQL_USER: neuroapp
      MYSQL_PASSWORD: neuropass123
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./database:/docker-entrypoint-initdb.d
    networks:
      - neuroscan_network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10

  web:
    build: .
    container_name: neuroscan_web
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      DB_HOST: mysql
      DB_USER: neuroapp
      DB_PASSWORD: neuropass123
      DB_NAME: neuroai_db
      FLASK_DEBUG: "False"
      FLASK_PORT: 5000
    volumes:
      - ./static/uploads:/app/static/uploads
      - ./logs:/app/logs
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - neuroscan_network

volumes:
  mysql_data:

networks:
  neuroscan_network:
    driver: bridge